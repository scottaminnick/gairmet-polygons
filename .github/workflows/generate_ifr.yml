name: Generate Latest IFR Polygons

on:
  # Fires 20 minutes after each real G-AIRMET cycle hour (03/09/15/21Z,
  # see GAIRMET_CYCLE_HOURS in pipeline/generate_latest_ifr.py) to give
  # NBM's posting lag some room -- NOT 20 minutes before, which would
  # always miss the cycle it's meant to be chasing and fall back to
  # the previous one.
  schedule:
    - cron: "20 3,9,15,21 * * *"
  # Manual trigger, with optional overrides so a forecaster can
  # regenerate with different settings without editing code.
  workflow_dispatch:
    inputs:
      threshold_pct:
        description: "Probability threshold (%) for hazard polygons"
        required: false
        default: "50"
      neighborhood_radius_nm:
        description: "Neighborhood-max smoothing radius (nautical miles) -- pulls nearby smaller areas into larger ones"
        required: false
        default: "50"
      min_area_sq_mi:
        description: "Minimum polygon area (sq mi) -- matches AIRMET/G-AIRMET's historical 'widespread' criterion by default"
        required: false
        default: "3000"

# Needed to commit the regenerated forecast-hour snapshots back to
# the repo -- the default GITHUB_TOKEN is read-only unless granted this.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Generate latest IFR polygons
        env:
          IFR_THRESHOLD_PCT: ${{ github.event.inputs.threshold_pct || '50' }}
          IFR_NEIGHBORHOOD_RADIUS_NM: ${{ github.event.inputs.neighborhood_radius_nm || '50' }}
          IFR_MIN_AREA_SQ_MI: ${{ github.event.inputs.min_area_sq_mi || '3000' }}
        run: python3 pipeline/generate_latest_ifr.py

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update IFR polygons [skip ci]"
          git push
