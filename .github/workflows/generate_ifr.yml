name: Generate Latest IFR Polygons

on:
  # Every 6 hours, offset 20 minutes to give NBM's posting lag some room.
  # Loosely mirrors real G-AIRMET's ~6-hour cadence rather than NBM's
  # own hourly cycle -- no need to regenerate more often than that for
  # a single near-term snapshot.
  schedule:
    - cron: "20 2,8,14,20 * * *"
  # Manual trigger, with an optional threshold override so a forecaster
  # can regenerate with a different cutoff without editing code.
  workflow_dispatch:
    inputs:
      threshold_pct:
        description: "Probability threshold (%) for hazard polygons"
        required: false
        default: "50"

# Needed to commit the regenerated output/ifr_latest.geojson back to
# the repo -- the default GITHUB_TOKEN is read-only unless granted this.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Generate latest IFR polygons
        env:
          IFR_THRESHOLD_PCT: ${{ github.event.inputs.threshold_pct || '50' }}
        run: python3 pipeline/generate_latest_ifr.py

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/ifr_latest.geojson
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update IFR polygons [skip ci]"
          git push
