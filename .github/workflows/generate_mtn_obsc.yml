name: Generate Latest Mountain Obscuration Polygons

on:
  # Fires 35 minutes after each real G-AIRMET cycle hour (03/09/15/21Z)
  # -- deliberately staggered LATER than generate_ifr.yml's 20-minute
  # mark (not just cosmetically different): this hazard fetches NINE
  # real NBM fields per forecast hour vs. IFR's four (see
  # pipeline/hazards/mtn_obsc.py's docstring), so it takes noticeably
  # longer to run. Running both workflows at the same offset risked
  # both trying to commit/push to the repo around the same time; this
  # gap gives IFR's run room to finish and push first.
  schedule:
    - cron: "35 3,9,15,21 * * *"
  # Manual trigger, with optional overrides so a forecaster can
  # regenerate with different settings without editing code.
  workflow_dispatch:
    inputs:
      threshold_pct:
        description: "Probability threshold (%) for hazard polygons"
        required: false
        default: "50"
      clearance_margin_ft:
        description: "Terrain clearance margin (ft) added to real terrain rise before interpolating probability -- 0/500/1000/2000 are the standard options"
        required: false
        default: "500"
      neighborhood_radius_nm:
        description: "Neighborhood-max smoothing radius (nautical miles) -- pulls nearby smaller areas into larger ones"
        required: false
        default: "50"
      min_area_sq_mi:
        description: "Minimum polygon area (sq mi) -- matches AIRMET/G-AIRMET's historical 'widespread' criterion by default"
        required: false
        default: "3000"

# Needed to commit the regenerated forecast-hour snapshots back to
# the repo -- the default GITHUB_TOKEN is read-only unless granted this.
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Was completely unset originally -- a real production run took over
    # 30 minutes and had to be manually cancelled, with no automatic
    # timeout at all (GitHub's own default cap is 360 minutes/6 hours for
    # a job with no explicit limit).
    #
    # First attempt at a fix was concurrent fetching, set to 20 min based
    # on that approach's measured speedup -- but a real run then revealed
    # the ORIGINAL diagnosis was wrong about the mechanism: fetch+cfgrib
    # was always fast (under 6s/field); the real cost was
    # regrid_to_regular_latlon()'s default "linear" interpolation method
    # (140-198s/field, confirmed directly from that run's own timing
    # output). Fixed at the source with method="nearest" for this
    # hazard's regrid calls specifically (~20x faster, measured directly
    # -- see prepare_mtn_obsc_grid's docstring for the full story), which
    # in turn made the concurrency itself counterproductive (CPU
    # contention under threads once the real bottleneck was gone), so
    # this reverted to plain sequential fetching.
    #
    # 30 min gives real margin above a rough estimate (~10-15 min) for
    # this fix, since -- unlike the concurrency attempt -- it hasn't yet
    # been confirmed against a real production run. Tighten this once a
    # real run confirms actual numbers, same as MOUNTAINOUS_RELIEF_THRESHOLD_FT
    # and terrain_radius_nm are provisional pending real confirmation.
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Generate latest Mountain Obscuration polygons
        env:
          MTN_OBSC_THRESHOLD_PCT: ${{ github.event.inputs.threshold_pct || '50' }}
          MTN_OBSC_CLEARANCE_MARGIN_FT: ${{ github.event.inputs.clearance_margin_ft || '500' }}
          MTN_OBSC_NEIGHBORHOOD_RADIUS_NM: ${{ github.event.inputs.neighborhood_radius_nm || '50' }}
          MTN_OBSC_MIN_AREA_SQ_MI: ${{ github.event.inputs.min_area_sq_mi || '3000' }}
        run: python3 pipeline/generate_latest_mtn_obsc.py

      - name: Commit and push updated output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update Mountain Obscuration polygons [skip ci]"
          git push
