name: Test Live IFR Fetch

# Manual trigger only -- this is a smoke test for the real fetch/regrid/
# combine pipeline, not a scheduled production run yet.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Full requirements.txt this time -- unlike inspect_nbm.py, this
      # actually needs cfgrib/eccodes/xarray/pyproj/scipy to parse real
      # GRIB2 messages and reproject them.
      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run live IFR pipeline test
        run: python3 pipeline/test_live_ifr_fetch.py

      - name: Upload output GeoJSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ifr-live-output
          path: test_ifr_live_output.geojson
          if-no-files-found: warn
