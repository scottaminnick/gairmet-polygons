name: Inspect NBM Data

# Manual trigger only (via the "Run workflow" button on the Actions tab).
# This is a one-off discovery task, not something that needs to run on a
# schedule -- once we know the real field names, this workflow can be
# deleted or repurposed into the real scheduled pipeline.
on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Just `requests` now -- this script reads NBM's .idx text file
      # directly rather than going through herbie-data/cfgrib/eccodes,
      # which aren't needed just to inspect an index.
      - name: Install dependencies
        run: pip install requests

      - name: Run inspection script
        run: python3 pipeline/inspect_nbm.py

      - name: Upload inventory files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nbm-inventory
          path: |
            nbm_full_inventory.csv
            nbm_idx_raw.txt
          if-no-files-found: warn
