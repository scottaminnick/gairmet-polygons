<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>G-AIRMET Polygon Viewer</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="map"></div>

<div class="panel panel-top-left">
  <div class="panel-title">G-AIRMET POLYGON VIEWER</div>
  <div class="panel-row"><span class="label">VALID</span><span id="valid-time" class="mono value">--------Z</span></div>
  <div class="panel-row"><span class="label">SOURCE</span><span class="mono value">NBM PROB GUIDANCE (DEMO)</span></div>
</div>

<div class="panel panel-top-right">
  <div class="panel-title">LAYERS</div>
  <label class="layer-toggle">
    <input type="checkbox" id="toggle-ifr" checked />
    <span class="swatch swatch-ifr"></span>
    <span class="mono">IFR CIG/VIS</span>
  </label>
  <label class="layer-toggle layer-disabled" title="Mountain obscuration hazard not yet implemented -- see project README">
    <input type="checkbox" id="toggle-mtn" disabled />
    <span class="swatch swatch-mtn"></span>
    <span class="mono">MTN OBSC</span>
    <span class="pending">soon</span>
  </label>
  <label class="layer-toggle">
    <input type="checkbox" id="toggle-states" checked />
    <span class="swatch swatch-states"></span>
    <span class="mono">STATE BOUNDARIES</span>
  </label>
  <label class="layer-toggle layer-disabled" title="No ARTCC boundary file loaded yet -- see project README for how to add one">
    <input type="checkbox" id="toggle-artcc" disabled />
    <span class="swatch swatch-artcc"></span>
    <span class="mono">ARTCC BOUNDARIES</span>
    <span class="pending">no data</span>
  </label>
</div>

<div class="panel panel-bottom-left" id="legend">
  <div class="panel-title">LEGEND</div>
  <div class="legend-row"><span class="swatch swatch-ifr"></span><span class="mono">PROB(IFR) &ge; <span id="legend-threshold">70</span>%</span></div>
</div>

<div class="disclaimer">
  DEMO DATA &mdash; NOT FOR OPERATIONAL USE OR FLIGHT PLANNING
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="map.js"></script>
</body>
</html>
